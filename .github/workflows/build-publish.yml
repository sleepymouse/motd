name: Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "primary=${BASE}:${SHA}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: ./gradlew test

      - name: Build image
        run: ./gradlew bootBuildImage --imageName="${{ steps.meta.outputs.primary }}"

      - name: Push image
        run: docker push "${{ steps.meta.outputs.primary }}"

      - name: Update image tag in gitops repo
        run: |
          SHA=$(echo '${{ github.sha }}' | cut -c1-7)
          git clone https://x-access-token:${GITOPS_PAT}@github.com/sleepymouse/gitops.git gitops-repo
          cd gitops-repo
          sed -i "s/tag: .*/tag: \"${SHA}\"/" gitops-repo/environments/dev/motd-values.yaml
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add gitops-repo/environments/dev/motd-values.yaml
          git commit -m "ci: update motd image tag to ${SHA}"
          git push
