name: Build and Publish

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: |
          BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            PRIMARY="${BASE}:${GITHUB_REF#refs/tags/v}"
            EXTRA=""
          else
            PRIMARY="${BASE}:latest"
            EXTRA="${BASE}:sha-${GITHUB_SHA::7}"
          fi
          echo "primary=${PRIMARY}" >> "$GITHUB_OUTPUT"
          echo "extra=${EXTRA}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: ./gradlew test

      - name: Build image
        run: ./gradlew bootBuildImage --imageName="${{ steps.meta.outputs.primary }}"

      - name: Push image
        run: |
          docker push "${{ steps.meta.outputs.primary }}"
          if [[ -n "${{ steps.meta.outputs.extra }}" ]]; then
            docker tag "${{ steps.meta.outputs.primary }}" "${{ steps.meta.outputs.extra }}"
            docker push "${{ steps.meta.outputs.extra }}"
          fi
